<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>IA Analysis Platform</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f9fafb;
            color: #111827;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            text-align: center;
            background: #ffffff;
            padding: 48px 56px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #e5e7eb;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 14px; color: #111827; }
        p { font-size: 16px; color: #6b7280; line-height: 1.8; }
        .status { margin-top: 24px; font-size: 14px; color: #9ca3af; }
        .dot-anim::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>IA Analysis Platform</h1>
        <p>서버를 초기화하고 있습니다.<br>잠시만 기다려주세요.</p>
        <div class="status">연결 대기 중<span class="dot-anim"></span> &nbsp; (<span id="elapsed">0</span>초)</div>
    </div>
    <script>
        const SERVER = 'http://localhost:8005';
        const startTime = Date.now();
        const elapsedEl = document.getElementById('elapsed');

        setInterval(() => {
            elapsedEl.textContent = Math.floor((Date.now() - startTime) / 1000);
        }, 1000);

        function checkServer() {
            fetch(SERVER + '/api/health', { mode: 'cors' })
                .then(res => { if (res.ok) window.location.href = SERVER; })
                .catch(() => {});
        }

        setInterval(checkServer, 1500);
        checkServer();
    </script>
</body>
</html>
